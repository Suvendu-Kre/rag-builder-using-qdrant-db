agent_name: Agent
agentic_framework: langchain
llm_provider: google_vertexai
model: gemini-2.0-flash-001
security:
  auth_type: api_key
  rate_limit: 60
  encryption: True
guardrails:
  content_filtering: True
  input_validation: True
  output_validation: True
error_handling:
  ai_managed: False
  retry_attempts: 3
  retry_strategy: exponential
  timeout: 30
  circuit_breaker: False
observability:
  enabled_checkpoints: {}
deployment:
  platform: gcp
  region: us-central1